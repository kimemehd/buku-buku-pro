<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Buku Pro - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #1a252f; }
        .note { font-size: 11px; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>📚 Buku Buku Pro</h2>
        <p>Ingia kwenye akaunti yako</p>
        
        <form action="/login" method="POST">
            <input type="tel" name="simu" placeholder="Namba ya Simu (Mf: 07...)" required>
            <input type="password" name="password" placeholder="Neno la Siri (Password)" required>
            <button type="submit">Ingia Mfumo</button>
        </form>

        <div class="note">
            *Kama ni mwanachama mpya, tumia namba yako ya simu na password ya sasa: <strong>1234</strong> (Kiongozi anaweza kuibadilisha).
        </div>
    </div>

</body>
</html>
